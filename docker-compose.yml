services:
  postgres:
    image: postgres:16

    container_name: natiq-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: natiq
      POSTGRES_PASSWORD: natiq
      POSTGRES_DB: natiq_bot

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: natiq-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

  bot:
    build: .

    container_name: natiq-bot

    depends_on:
      - postgres
      - redis

    env_file:
      - .env

    volumes:
      - .:/app

    command: python bot.py

volumes:
  postgres-data:
