services:
  postgres:
    image: postgres:16
    container_name: natiq-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: natiq
      POSTGRES_PASSWORD: natiq
      POSTGRES_DB: natiq_bot

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: natiq-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  bot:
    build: .

    container_name: natiq-bot

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    env_file:
      - .env

    volumes:
      - .:/app

volumes:
  postgres-data:
